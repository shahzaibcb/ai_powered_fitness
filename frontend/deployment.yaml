apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-fitness-app
  labels:
    app: frontend-fitness-app
  namespace: fitness-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-fitness-app
  template:
    metadata:
      labels:
        app: frontend-fitness-app
    spec:
      containers:
        - name: frontend-fitness-app
          image: us-east1-docker.pkg.dev/project-00bb5b73-6cae-4dfd-bd3/nutrition-repo/frontend_fitness_app:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-fitness-app-service
  namespace: fitness-ns
spec:
  selector:
    app: frontend-fitness-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer
